<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nathan L</title>
  <link rel="icon" href="files/logos/favicon.png" type="image/png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="header"></div>
  <main>
    <h2>Get in Touch!</h2>
    <div class="content">
      <form action="https://formspree.io/f/xvzdlqkg" method="POST">
        <div class="form-group">
          <label for="name">Name</label>
          <input id="name" type="text" name="Name" placeholder="Your name" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" name="Email" placeholder="your@email.com" required />
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="Message" placeholder="What's on your mind?" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn-primary form-submit">Send Message →</button>
      </form>
    </div>
    <p></p>
    <p></p>
    <p></p>
  </main>
  <div id="footer"></div>
  <script src="script.js"></script>
</body>
</html>
